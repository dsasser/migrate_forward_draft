id: demo_product
status: true
label: 'Demo product (entity_with_forward_draft)'
migration_tags: {  }
migration_group: demo
dependencies:
  enforced:
    module:
      - migrate_forward_draft_demo
  config:
    - node.type.product
    - field.field.node.product.field_product_sku
    - field.field.node.product.field_product_notes
    - workflows.workflow.mfd_demo
  module:
    - migrate_forward_draft
    - migrate_plus
    - node
source:
  plugin: embedded_data
  data_rows:
    -
      id: 1
      title: 'Product One'
      sku: 'ABC-001'
    -
      id: 2
      title: 'Product Two'
      sku: 'DEF-001'
  ids:
    id:
      type: integer
process:
  type:
    plugin: default_value
    default_value: product
  title: title
  field_product_sku: sku
  moderation_state:
    plugin: default_value
    default_value: published
  new_revision:
    plugin: default_value
    default_value: true
  revision_default:
    plugin: default_value
    default_value: true
  revision_log:
    plugin: default_value
    default_value: 'Updated by demo migration.'
destination:
  plugin: 'entity_with_forward_draft:node'
  default_bundle: product
  overwrite_properties:
    - title
    - field_product_sku
    - new_revision
    - revision_default
    - revision_log
  forward_revision_overwrite_properties:
    - title
    - field_product_sku
migration_dependencies:
  required: {  }
